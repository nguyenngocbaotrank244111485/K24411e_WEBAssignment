<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrintiFy — Login</title>
  <link rel="stylesheet" type="text/css" href="../css/logincss.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand">
        <div class="brand-logo">Printi<span>Fy</span></div>
        <p>Đăng nhập để tiếp tục thiết kế và đặt hàng.</p>
      </div>

      <form id="loginForm" class="form">
        <label class="field">
          <span>Email</span>
          <input id="email" type="email" placeholder="name@gmail.com" autocomplete="email" required />
        </label>

        <label class="field">
          <span>Mật khẩu</span>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </label>

        <div class="actions-row">
          <label class="remember">
            <input id="rememberMe" type="checkbox" />
            <span>Ghi nhớ đăng nhập</span>
          </label>
          <button type="button" id="forgotBtn" class="link-btn">Quên mật khẩu?</button>
        </div>

        <button class="primary-btn" type="submit">Đăng nhập</button>
        <p id="message" class="message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <div id="modalOverlay" class="modal-overlay hidden"></div>

  <section id="forgotModal" class="modal hidden" aria-hidden="true">
    <header class="modal-header">
      <h2>Khôi phục mật khẩu</h2>
      <button class="icon-btn" id="closeModalBtn" aria-label="Đóng">✕</button>
    </header>

    <div class="modal-body">
      <div class="step" id="stepEmail">
        <p>Nhập email của bạn để xem câu hỏi bảo mật.</p>
        <input id="forgotEmail" type="email" placeholder="name@gmail.com" />
        <button id="lookupBtn" class="primary-btn">Tiếp tục</button>
      </div>

      <div class="step hidden" id="stepQuestion">
        <p class="hint">Câu hỏi bảo mật:</p>
        <div id="securityQuestion" class="question-box"></div>
        <input id="securityAnswer" type="text" placeholder="Nhập câu trả lời" />
        <button id="verifyAnswerBtn" class="primary-btn">Xác minh</button>
      </div>

      <div class="step hidden" id="stepReset">
        <p>Tạo mật khẩu mới cho tài khoản này.</p>
        <input id="newPassword" type="password" placeholder="Mật khẩu mới" />
        <input id="confirmPassword" type="password" placeholder="Xác nhận mật khẩu" />
        <button id="resetPasswordBtn" class="primary-btn">Đổi mật khẩu</button>
      </div>
    </div>
  </section>

  <script src="../js/login.js"></script>
</body>
</html>
